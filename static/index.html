<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Battery Predictive Maintenance</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e2e8f0;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: var(--card-bg);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .result-card {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none; /* Hidden by default */
            animation: fadeIn 0.4s ease-in-out;
        }

        .result-card.success {
            display: block;
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 1px solid #bbf7d0;
        }

        .result-card.error {
            display: block;
            background-color: var(--error-bg);
            color: var(--error-text);
            border: 1px solid #fecaca;
        }

        .result-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Spinner for loading state */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>EV Battery Diagnostics</h1>
            <p>Real-time AI capacity prediction</p>
        </div>
        
        <div class="input-group">
            <label for="temp">Ambient Temperature (°C)</label>
            <input type="number" id="temp" value="24" step="0.1" placeholder="e.g. 24.0">
        </div>

        <div class="input-group">
            <label for="re">Electrolyte Resistance (Re)</label>
            <input type="number" id="re" value="0.056" step="0.001" placeholder="e.g. 0.056">
        </div>

        <div class="input-group">
            <label for="rct">Charge Transfer Resistance (Rct)</label>
            <input type="number" id="rct" value="0.200" step="0.001" placeholder="e.g. 0.200">
        </div>

        <button id="predictBtn" onclick="runPrediction()">
            <div class="spinner" id="btnSpinner"></div>
            <span id="btnText">Analyze Battery Health</span>
        </button>

        <div id="resultCard" class="result-card">
            <div class="result-title" id="resultTitle">Predicted Capacity</div>
            <div class="result-value" id="resultValue">-- Ah</div>
        </div>
    </div>

    <script>
        async function runPrediction() {
            const btn = document.getElementById('predictBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultCard = document.getElementById('resultCard');
            const resultTitle = document.getElementById('resultTitle');
            const resultValue = document.getElementById('resultValue');

            // 1. Set UI to Loading State
            btn.disabled = true;
            btnText.innerText = "Analyzing...";
            btnSpinner.style.display = "inline-block";
            resultCard.className = "result-card"; // Reset classes

            // 2. Gather data
            const payload = {
                ambient_temperature: parseFloat(document.getElementById('temp').value),
                Re: parseFloat(document.getElementById('re').value),
                Rct: parseFloat(document.getElementById('rct').value)
            };

            try {
                // 3. Send data to the API
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("API Network Error");

                const data = await response.json();
                
                // 4. Display Success
                resultTitle.innerText = "Remaining Capacity";
                resultValue.innerText = data.predicted_capacity_Ah.toFixed(4) + " Ah";
                resultCard.classList.add('success');

            } catch (error) {
                // 5. Display Error
                resultTitle.innerText = "Error";
                resultValue.innerText = "Connection Failed";
                resultCard.classList.add('error');
                console.error("Prediction Error:", error);
            } finally {
                // 6. Reset UI Button
                btn.disabled = false;
                btnText.innerText = "Analyze Battery Health";
                btnSpinner.style.display = "none";
            }
        }
    </script>
</body>
</html>
