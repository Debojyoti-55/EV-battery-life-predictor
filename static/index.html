<!DOCTYPE html>
<html>
<head>
    <title>EV Battery Diagnostics</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; max-width: 600px; margin: auto; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 8px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-size: 1.5em; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI Battery Capacity Predictor</h2>
        
        <label>Ambient Temperature (°C):</label>
        <input type="number" id="temp" value="24" step="0.1">

        <label>Electrolyte Resistance (Re):</label>
        <input type="number" id="re" value="0.056" step="0.001">

        <label>Charge Transfer Resistance (Rct):</label>
        <input type="number" id="rct" value="0.200" step="0.001">

        <button onclick="runPrediction()">Analyze Battery</button>

        <div id="result">Predicted Capacity: -- Ah</div>
    </div>

    <script>
        async function runPrediction() {
            // 1. Gather data from the form
            const payload = {
                ambient_temperature: parseFloat(document.getElementById('temp').value),
                Re: parseFloat(document.getElementById('re').value),
                Rct: parseFloat(document.getElementById('rct').value)
            };

            // 2. Send the data to your Python backend
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // 3. Display the result
            const data = await response.json();
            document.getElementById('result').innerText = 
                "Predicted Capacity: " + data.predicted_capacity_Ah.toFixed(4) + " Ah";
        }
    </script>
</body>
</html>
